<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OutcomeHub - Login</title>
  <link rel="stylesheet" href="forgetpassword.css">
</head>
<body>
  <div class="auth-wrapper">
    <html class="login-card">
      
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-arrow-up"></i>
        </div>
        <h1>OutcomeHub</h1>
      </div>

      <p class="subtitle">Welcome back. Please enter your details.</p>

      <!-- Form -->
      <bod id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="coordinator@ngo.org" required>
          </div>
          <span class="error-msg"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="••••" required>
            <i class="fas fa-eye-slash toggle-pass"></i>
          </div>
          <span class="error-msg"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html">Forgot Password?</a>
        </div>
  
          <script src="forgetpassword.js"></script>
    </bod>
    </html>
