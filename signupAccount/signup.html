<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OutcomeHub - Create Account</title>
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <main class="auth-container">
    
    <!-- Left Panel -->
    <section class="auth-left">
      <div class="brand">
        <i class="fas fa-arrow-left"></i>
        <span>OutcomeHub</span>
      </div>
      
      <div class="hero-text">
        <h1>Empower Your<br>Mission, Not Your<br>Spreadsheet.</h1>
        <p>Join thousands of coordinators and volunteers building trust through transparent data.</p>
      </div>
    </section>

    <!-- Right Panel -->
    <section class="auth-right">
      <div class="form-wrapper">
        <h2>Create an account</h2>
        <p class="subtitle">Enter your details below to get started.</p>

        <!-- Social Login -->
        <div class="social-grid">
          <button type="button" class="social-btn" data-provider="google">
            <i class="fab fa-google"></i> Google
          </button>
          <button type="button" class="social-btn" data-provider="apple">
            <i class="fab fa-apple"></i> Apple
          </button>
        </div>

        <div class="divider"><span>Or continue with email</span></div>

        <!-- Signup Form -->
        <form id="signupForm" novalidate>
          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email" required>
            <small class="error-text" aria-live="polite"></small>
          </div>

          <div class="form-field">
            <label for="password">Password</label>
            <div class="password-field">
              <input type="password" id="password" name="password" placeholder="••••" autocomplete="new-password" required>
              <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
            <small class="error-text" aria-live="polite"></small>
          </div>

          <div class="form-field">
